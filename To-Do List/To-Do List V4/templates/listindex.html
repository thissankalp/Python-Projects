<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>

    <h1>Add Task</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter Task">
        <button type="submit">Add</button>
    </form>

    {% for task in tasks %}
    <li>
    {{ task[1] }}

    <a href="/delete/{{ task[0] }}">
        Delete
    </a>

    <a href="/edit/{{ task[0] }}">
    Edit
    </a>
    </li>

{% endfor %}

</body>
</html>
