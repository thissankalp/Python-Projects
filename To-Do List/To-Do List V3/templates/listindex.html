<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>

    <h1>Add Task</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter Task">
        <button type="submit">Add</button>
    </form>

    <ul>
    {% for task in tasks %}
    <li>{{ task }} <a href="/delete/{{ loop.index0 }}">Delete</a> </li>
    {% endfor %}
    </ul>

</body>
</html>
